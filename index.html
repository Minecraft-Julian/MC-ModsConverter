<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Mods Converter</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- JSZip CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="background-animation">
        <div class="blob shape-1"></div>
        <div class="blob shape-2"></div>
        <div class="blob shape-3"></div>
    </div>

    <div class="app-container">
        <header>
            <div class="logo-container">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="logo-icon">
                    <path
                        d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
                    </path>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                    <line x1="12" y1="22.08" x2="12" y2="12"></line>
                </svg>
            </div>
            <h1>MC Mods Converter</h1>
            <p>Convert Java Mods (.jar) into Bedrock Addons (.mcaddon).</p>
        </header>

        <main>
            <div class="dropzone" id="dropzone" tabindex="0" role="button" aria-label="Click or drag to upload a mod file">
                <input type="file" id="fileInput" class="file-input" accept=".jar, .zip">
                <div class="dropzone-content">
                    <div class="upload-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                    </div>
                    <h3>Drag & Drop your .jar file here</h3>
                    <p>or click to browse from your computer</p>
                    <p style="font-size: 0.75rem; color: #F59E0B; margin-top: 0.5rem;">Large mods (>100MB) may take
                        significant time/RAM.</p>
                </div>
            </div>

            <div class="status-panel hidden" id="statusPanel">
                <div class="status-indicator">
                    <div class="spinner" id="spinner"></div>
                    <svg id="successIcon" class="hidden success-icon" width="24" height="24" viewBox="0 0 24 24"
                        fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                </div>
                <div class="status-texts" style="width: 100%;">
                    <h4 id="statusTitle">Processing...</h4>
                    <p id="statusDesc">Reading file architecture</p>
                    <div class="progress-bar-container hidden" id="progressContainer">
                        <div class="progress-bar-fill" id="progressBarFill" style="width: 0%;"></div>
                    </div>
                </div>
            </div>

            <div class="errors-container hidden" id="errorsContainer">
                <div class="errors-header">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z">
                        </path>
                        <line x1="12" y1="9" x2="12" y2="13"></line>
                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg>
                    <h4>Warnings & Errors</h4>
                </div>
                <ul id="errorsList" class="errors-list"></ul>
            </div>

            <a id="downloadBtn" class="download-btn hidden" download="converted.mcaddon">
                <span id="downloadBtnText">Download .mcaddon</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
            </a>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
